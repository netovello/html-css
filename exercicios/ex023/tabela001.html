<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.2em;
            text-align: center;
        }

        table{
            
            margin: auto;
            width: 400px;
            height: 400px;
            text-align: center;
            border-collapse: collapse;
            
            
            
            
        }

        td{
            border: 1px solid black;
            padding: 5px;
            
            
        }

        tr.cabecalho {
            background-color: rgb(190, 16, 16);
            font-weight: bold;
            color: aliceblue;
            
        }


    </style>

</head>
<body>
    <h1>MInha primeira Tabela</h1>

    <table>
        <tr class="cabecalho"> 
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr>
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>
        <tr>
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr>
            <td>A4</td>
            <td>B4</td>
            <td>C4</td>
        </tr>

    </table>
    
</body>
</html>
