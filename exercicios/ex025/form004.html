<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="get">

        <fieldset>
            <legend>Dados Pessoais</legend>
            <p>
                <label for="inome">Nome</label>
                <input type="text" name="nome" id="inome" required maxlength="20" minlength="5" placeholder="Seu nome">
            </p>
            
            <p><label for="iemail">Email</label>
                <input type="email" name="email" id="iemail" placeholder="Seu Email">
            </p>
            <p>
                <label for="icel">WhatsApp</label>
                <input type="tel" name="cel" id="icel"
                pattern="^+[0-9]{2} [0-9]{2} [0-9]{1} [0-9]{4}-[0-9]{4}$" required value="+xx xx x xxxx-xxxx">
            </p>
        </fieldset>

        <fieldset>
            <legend>Dados da Empresa</legend>
            <p>
                <label for="inomeempresa">Nome da Empresa</label>
                <input type="text" name="nomedaempresa" id="inomedaempresa">
            </p>
            <p>
                <label for="icnpj">CNPJ</label>
                <input type="number" required placeholder="XX.XXX.XXX/XXXX-XX" maxlength="18">
            </p>

        </fieldset>
        <!-- Estudar mais sobre RegEx -->
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>
    
</body>
</html>
