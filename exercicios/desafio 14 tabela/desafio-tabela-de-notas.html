<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota de Alunos</title>
    <style>
        table{
            margin: auto;
            width: 500px;
        }
        h1{
            text-align: center;
        }

        th{
            border: 1px solid black;
        }

        td{
            border: 1px solid black;
            height: 30px;
            text-align: center;
        }

        th.media{
            background-color: darkgray;
            color: white;
            height: 30px;
            text-align: left;
            padding-left: 15px;
        }

        th.cabecalho{
            background-color: darkgray;
            color: white;
            height: 30px;
        }

        th.nota{
            background-color: gray;
            color: white;
            
        }
        td.materia{
            text-align: left;
            padding-left: 15px;
        }

        tfoot {
            background-color: black;
            color: white;
            font-weight: bold;
            height: 30px;
        }

       
    </style>
</head>
<body>
    <h1>Desafio Tabela Notas de Alunos</h1>

    <table>
        
        <thead>
            <tr>
            <th rowspan="2" class="cabecalho" scope="col">Area</th>
            <th rowspan="2" class="cabecalho" scope="col">Disciplina</th>
            <th colspan="2" class="cabecalho" scope="colgroup">Nota</th>
            <th rowspan="2" class="cabecalho" scope="col">Média</th>
            </tr>

            <tr>
                <th class="nota" scope="col">Nota 1</th>
                <th class="nota" scope="col">Nota 2</th>
            </tr>
        </thead>
        
        <tbody>
            <tr>
                <th rowspan="4" scope="rowgroup">Exatas</th>
                <td class="materia">Matemática</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <td class="materia">Física</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <td class="materia">Química</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            
            <tr>
                <td class="materia">Biologia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <th colspan="4" class="media" scope="row">Média de Exatas</th>
                <td>0.0</td>
            </tr>

            <tr>
                <th rowspan="2" scope="rowgroup">Humanas</th>
                <td class="materia">História</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <td class="materia">Geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <th colspan="4" class="media" scope="row">Média de Humanas</th>
                <td>0.0</td>
            </tr>

        </tbody>
                
        <tfoot>

         <tr>
            <td colspan="5">Tabela Finalizada</td>
        </tr>

        </tfoot>
    </table>
    
</body>
</html>
