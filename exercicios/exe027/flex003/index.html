<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexble Box</title>
    <STYle>
        div.container{
            background-color: salmon;
            display: flex;
            flex-flow: row wrap;
            /*flex-direction: row;
            flex-wrap: nowrap;*/
            justify-content:space-evenly;
            gap: 5px;
            padding: 5px;
            

        }
        div.item{
            background-color: aquamarine;
            border: 1px solid black;
            height: 100px;
            text-align: center;
            padding: 5px;    
            flex: auto;
        }
        div.item1{
            background-color: bisque;
            height: 500px;
            flex: auto;
        }




    </STYle>
</head>
<body>
    <section>
        <div class="item1">Exemplo de bloco A</div>
    </section>
    <section>
    <div class="container">
        <div class="item">Exemplo de bloco B</div>
        <div class="item">Exemplo de bloco C</div>
        <div class="item">Exemplo de bloco D</div>
        <div class="item">Exemplo de bloco E</div>
        <div class="item">Exemplo de bloco F</div>
        <div class="item">Exemplo de bloco G</div>
    </div>
    </section>



    
</body>
</html>
